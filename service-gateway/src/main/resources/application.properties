spring.application.name=service-gateway

server.port= 5050

eureka.client.service-url.defaultZone= http://localhost:9090/eureka

spring.cloud.gateway.server.webmvc.routes[0].id=AdminMicroservices
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://ADMINMICROSERVICES
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=path=/admin/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webmvc.routes[1].id=AuthMicroservices
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://AUTHMICROSERVICES
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=path=/auth/**
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webmvc.routes[2].id=DonorMicroservices
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://DONORMICROSERVICES
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=path=/donor/**
spring.cloud.gateway.server.webmvc.routes[2].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webmvc.routes[3].id=HospitalMicroservices
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://HOSPITALMICROSERVICES
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=path=/hospital/**
spring.cloud.gateway.server.webmvc.routes[3].filters[0]=StripPrefix=1

server.servlet.context-path=/gateway

